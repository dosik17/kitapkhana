<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📚 KITAPKHANA | 50 Gutenberg кітабы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #12102a 50%, #1a1535 100%);
            background-attachment: fixed;
            color: #e8e6f0;
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Десктопта ғана кастом курсор */
        @media (min-width: 769px) {
            .cursor {
                width: 20px;
                height: 20px;
                border: 2px solid #d9b4e0;
                border-radius: 50%;
                position: fixed;
                pointer-events: none;
                z-index: 9999;
                transition: transform 0.1s ease, width 0.2s, height 0.2s;
                transform: translate(-50%, -50%);
            }
            .cursor-hover {
                width: 40px;
                height: 40px;
                background: rgba(217,180,224,0.2);
                border-color: #d9b4e0;
            }
        }
        
        @media (max-width: 768px) {
            .cursor { display: none; }
        }
        
        /* Фондағы жұлдыздар */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Интро анимациясы */
        .intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a, #1a1535);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .intro.hide {
            opacity: 0;
            visibility: hidden;
        }
        .intro-logo {
            font-size: clamp(3rem, 15vw, 5rem);
            animation: logoFloat 0.8s ease-out, logoGlow 2s infinite;
        }
        @keyframes logoFloat {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes logoGlow {
            0%, 100% { text-shadow: 0 0 5px #6a4e8c; }
            50% { text-shadow: 0 0 30px #d9b4e0; }
        }
        .intro-text {
            margin-top: 1rem;
            font-size: clamp(1rem, 6vw, 1.5rem);
            letter-spacing: 0.2rem;
            animation: textSlide 0.8s ease-out 0.3s both;
        }
        @keyframes textSlide {
            0% { opacity: 0; transform: translateY(30px); letter-spacing: 0.5rem; }
            100% { opacity: 1; transform: translateY(0); letter-spacing: 0.2rem; }
        }
        .intro-progress {
            width: min(200px, 60vw);
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin-top: 2rem;
            border-radius: 2px;
            overflow: hidden;
            animation: progressBar 2s ease-in-out forwards;
        }
        @keyframes progressBar {
            0% { width: 0px; opacity: 0; }
            20% { width: min(50px, 15vw); opacity: 1; }
            50% { width: min(120px, 35vw); }
            100% { width: min(200px, 60vw); opacity: 0; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1a2e; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #6a4e8c; border-radius: 10px; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes borderGlow {
            0% { border-color: #2a2343; box-shadow: 0 0 0 0 rgba(106,78,140,0); }
            50% { border-color: #886ab0; box-shadow: 0 0 15px 0 rgba(136,106,176,0.3); }
            100% { border-color: #2a2343; box-shadow: 0 0 0 0 rgba(106,78,140,0); }
        }
        
        .header {
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0.8rem 1rem;
            animation: slideIn 0.5s ease-out;
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
        }
        .logo h1 {
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            background: linear-gradient(135deg, #e8b4b8, #b98fcf, #7c9ed6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.6rem; opacity: 0.6; }
        
        /* Мобильді іздеу */
        .search-wrapper {
            display: flex;
            gap: 0.4rem;
            background: #1e1a30;
            padding: 0.2rem 0.6rem;
            border-radius: 60px;
            border: 1px solid #3a2e5a;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 250px;
        }
        @media (max-width: 480px) {
            .search-wrapper { max-width: 180px; }
            .search-wrapper input { width: 120px; font-size: 0.8rem; }
            .search-wrapper button { padding: 0.3rem 0.7rem; font-size: 0.75rem; }
        }
        .search-wrapper:focus-within {
            border-color: #886ab0;
            box-shadow: 0 0 10px rgba(136,106,176,0.3);
        }
        .search-wrapper input {
            background: transparent;
            border: none;
            padding: 0.5rem;
            width: 160px;
            color: white;
            outline: none;
            font-size: 0.85rem;
        }
        .search-wrapper button {
            background: #6a4e8c;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .search-wrapper button:active { transform: scale(0.95); }
        
        /* Жанр фильтрлері - мобильдіге бейімделген */
        .genre-filter {
            max-width: 1400px;
            margin: 1rem auto 0;
            padding: 0 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            position: relative;
            z-index: 10;
        }
        .genre-btn {
            background: #1e1835;
            border: none;
            padding: 0.4rem 0.9rem;
            border-radius: 40px;
            color: #ddd;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .genre-btn { padding: 0.3rem 0.7rem; font-size: 0.7rem; }
        }
        .genre-btn:active { transform: scale(0.95); }
        .genre-btn.active, .genre-btn:hover {
            background: #6a4e8c;
            color: white;
        }
        
        /* Кітаптар торы - мобильдіге бейімделген */
        .books-container {
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            position: relative;
            z-index: 10;
        }
        @media (min-width: 768px) and (max-width: 1024px) {
            .books-container { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
        }
        @media (min-width: 1024px) {
            .books-container { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
        }
        
        .book-card {
            background: #141024;
            border-radius: 0.8rem;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #2a2343;
            cursor: pointer;
            animation: fadeInUp 0.5s ease-out backwards;
        }
        .book-card:active { transform: scale(0.98); }
        @media (min-width: 769px) {
            .book-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(0,0,0,0.4);
                border-color: #886ab0;
            }
        }
        
        .book-cover {
            height: 200px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        @media (min-width: 768px) {
            .book-cover { height: 230px; }
        }
        @media (min-width: 1024px) {
            .book-cover { height: 250px; }
        }
        
        .book-info { padding: 0.7rem; }
        .book-title { 
            font-weight: 600; 
            font-size: 0.85rem; 
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }
        .book-author { font-size: 0.65rem; opacity: 0.7; margin-bottom: 0.2rem; }
        .book-desc {
            font-size: 0.65rem;
            opacity: 0.7;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        @media (min-width: 768px) {
            .book-desc { -webkit-line-clamp: 3; }
        }
        .book-genre {
            font-size: 0.6rem;
            background: #2a2343;
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            margin-top: 0.3rem;
        }
        
        .stats { 
            text-align: center; 
            font-size: 0.8rem; 
            margin: 0.5rem auto; 
            padding: 0.4rem 1rem; 
            background: #1e1835; 
            border-radius: 40px; 
            display: inline-block;
        }
        .stats-container { text-align: center; }
        .no-books { text-align: center; grid-column: 1/-1; padding: 2rem; opacity: 0.6; font-size: 0.85rem; }
        footer { text-align: center; padding: 1rem; font-size: 0.65rem; opacity: 0.4; }
        
        /* Модалды терезе */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            padding: 1rem;
        }
        .modal-content {
            background: #1e1835;
            border-radius: 1.2rem;
            max-width: 450px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.2rem;
            border: 1px solid #886ab0;
            position: relative;
            animation: fadeInUp 0.3s ease;
        }
        .modal-content h3 { font-size: 1.2rem; margin-bottom: 0.5rem; padding-right: 1.5rem; }
        .modal-content p { font-size: 0.85rem; margin-bottom: 0.5rem; }
        .modal-cover { 
            width: 100%; 
            max-height: 200px; 
            object-fit: contain; 
            border-radius: 0.8rem; 
            margin-bottom: 0.8rem; 
        }
        .full-link { 
            display: inline-block; 
            background: #6a4e8c; 
            color: white; 
            padding: 0.5rem 1rem; 
            border-radius: 40px; 
            text-decoration: none; 
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }
        .close-modal { 
            position: absolute; 
            top: 12px; 
            right: 16px; 
            font-size: 1.5rem; 
            cursor: pointer; 
            color: #ccc;
        }
        
        /* Мобильді чат-бот */
        .chat-bot { 
            position: fixed; 
            bottom: 15px; 
            right: 15px; 
            z-index: 200; 
        }
        .chat-toggle { 
            width: 50px; 
            height: 50px; 
            background: linear-gradient(135deg, #6a4e8c, #4a2a6e); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-size: 1.5rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .chat-toggle:active { transform: scale(0.95); }
        
        .chat-window { 
            position: absolute; 
            bottom: 60px; 
            right: 0; 
            width: 85vw;
            max-width: 320px;
            height: 450px; 
            background: #1e1835; 
            border-radius: 1rem; 
            border: 1px solid #886ab0; 
            display: none; 
            flex-direction: column; 
            overflow: hidden;
        }
        @media (min-width: 480px) {
            .chat-window { width: 320px; }
        }
        .chat-window.active { display: flex; }
        .chat-header { 
            background: #2a2343; 
            padding: 0.6rem; 
            text-align: center; 
            font-weight: bold; 
            font-size: 0.85rem;
            border-bottom: 1px solid #886ab0;
        }
        .chat-content { flex: 1; overflow-y: auto; padding: 0.6rem; }
        .genre-buttons { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid #3a2e5a; }
        .genre-select-btn { 
            background: #2a2343; 
            border: none; 
            padding: 0.3rem 0.7rem; 
            border-radius: 40px; 
            color: #ddd; 
            cursor: pointer; 
            font-size: 0.7rem;
        }
        .books-list { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.8rem; max-height: 200px; overflow-y: auto; }
        .book-select-btn { 
            background: #1e1835; 
            border: 1px solid #3a2e5a; 
            padding: 0.4rem; 
            border-radius: 0.5rem; 
            cursor: pointer; 
            font-size: 0.7rem;
        }
        .book-info-panel { background: #2a2343; border-radius: 0.8rem; padding: 0.6rem; margin-top: 0.5rem; }
        .read-link-btn { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
        .close-chat { float: right; cursor: pointer; }
        
        /* Конфетти */
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10001;
        }
        .confetti-piece {
            position: absolute;
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #e8b4b8, #b98fcf, #7c9ed6);
            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- Кастом курсор (десктопта ғана) -->
<div class="cursor" id="cursor"></div>

<!-- Фондағы жұлдыздар -->
<div class="stars" id="stars"></div>

<!-- Интро -->
<div class="intro" id="intro">
    <div class="intro-logo">📚</div>
    <div class="intro-text">KITAPKHANA</div>
    <div class="intro-progress"></div>
</div>

<div class="header">
    <div class="header-container">
        <div class="logo">
            <h1>📚 KITAPKHANA</h1>
            <p>50 Gutenberg кітабы</p>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Іздеу...">
            <button id="searchBtn">🔍</button>
        </div>
    </div>
</div>

<div class="genre-filter" id="genreFilter"></div>
<div class="stats-container"><div class="stats" id="stats">📊 0 / 0 кітап</div></div>
<div class="books-container" id="booksContainer"></div>
<footer>📖 50 кітап | Нақты обложкалары бар | Project Gutenberg</footer>

<div class="chat-bot">
    <div class="chat-toggle" id="chatToggle">💬</div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">📚 Кітапханашы көмекші <span class="close-chat" id="closeChat">✕</span></div>
        <div class="chat-content">
            <div style="text-align:center; padding:0.4rem; background:#2a2343; border-radius:0.5rem; margin-bottom:0.8rem; font-size:0.75rem;">
                <span id="chatGreeting">📖 Жанр таңдаңыз, содан кейін кітап таңдаңыз</span>
            </div>
            <div id="genreButtonsContainer" class="genre-buttons"></div>
            <div id="booksListContainer" class="books-list"></div>
            <div id="bookInfoPanel" class="book-info-panel" style="display:none;">
                <h4 id="infoTitle" style="font-size:0.9rem;">Кітап атауы</h4>
                <p id="infoAuthor" style="font-size:0.7rem;">✍️ Авторы:</p>
                <p id="infoGenre" style="font-size:0.7rem;">📚 Жанры:</p>
                <p id="infoYear" style="font-size:0.7rem;">📅 Жылы:</p>
                <a id="infoLink" class="read-link-btn" target="_blank">📖 Толық нұсқасын оқу</a>
            </div>
        </div>
    </div>
</div>

<div id="bookModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <img id="modalCover" class="modal-cover" alt="Мұқаба">
        <h3 id="modalTitle"></h3>
        <p id="modalAuthor"></p>
        <p id="modalGenre"></p>
        <p id="modalDesc"></p>
        <a href="#" id="modalLink" class="full-link" target="_blank">📖 Толық нұсқасын оқу</a>
    </div>
</div>

<script>
    // Жұлдыздарды жасау
    function createStars() {
        const starsContainer = document.getElementById('stars');
        const starCount = window.innerWidth < 768 ? 80 : 150;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.animationDuration = Math.random() * 3 + 2 + 's';
            starsContainer.appendChild(star);
        }
    }
    createStars();
    
    // Конфетти
    function createConfetti() {
        const confettiContainer = document.createElement('div');
        confettiContainer.className = 'confetti';
        document.body.appendChild(confettiContainer);
        const pieceCount = window.innerWidth < 768 ? 50 : 100;
        for (let i = 0; i < pieceCount; i++) {
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random() * 100 + '%';
            piece.style.width = Math.random() * 10 + 4 + 'px';
            piece.style.height = piece.style.width;
            piece.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
            piece.style.animationDelay = Math.random() * 0.5 + 's';
            confettiContainer.appendChild(piece);
        }
        setTimeout(() => confettiContainer.remove(), 3000);
    }
    
    // Десктопта ғана курсор
    if (window.innerWidth >= 769) {
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.querySelectorAll('button, .book-card, .genre-btn, .chat-toggle, .full-link').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-hover'));
        });
    }
    
    // Интро
    const intro = document.getElementById('intro');
    setTimeout(() => {
        intro.classList.add('hide');
        createConfetti();
        setTimeout(() => intro.style.display = 'none', 800);
    }, 2200);
    
    // Кітаптар
    const booksData = [
        { id:1, kk:"Преступление и наказание", author:"Фёдор Достоевский", genre:"Классика", year:1866, cover:"https://www.gutenberg.org/cache/epub/2554/pg2554.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/2554", desc:"Кедей студент Раскольников кәрі әйелді өлтіріп, өз теориясын сынамақ болады. Бірақ ар азабы оны қинай бастайды. Бұл адамгершілік, күнә және жаза туралы терең психологиялық роман." },
        { id:2, kk:"Война и мир", author:"Лев Толстой", genre:"Классика", year:1869, cover:"https://www.gutenberg.org/cache/epub/2600/pg2600.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/2600", desc:"Наполеон соғысы кезіндегі Ресей тарихы. Бірнеше дворян отбасының өмірі, махаббаты мен трагедиясы суреттеледі. Бұл әлем классикасының шедеврі." },
        { id:3, kk:"Анна Каренина", author:"Лев Толстой", genre:"Классика", year:1877, cover:"https://www.gutenberg.org/cache/epub/1399/pg1399.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1399", desc:"Анна Каренинаның трагедиялық махаббаты. Зайыбынан бас тартып, офицер Вронскийге ғашық болады. Қоғамның қаталдығы мен махаббат тақырыбы." },

        { id:5, kk:"Макбет", author:"Уильям Шекспир", genre:"Трагедия", year:1606, cover:"https://www.gutenberg.org/cache/epub/1533/pg1533.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1533", desc:"Шотландия генералы Макбет билік үшін патшаны өлтіреді. Бірақ кінә мен паранойя оны жойып жібереді. Билік пен адамгершілік туралы драма." },
        { id:6, kk:"Ромео и Джульетта", author:"Уильям Шекспир", genre:"Трагедия", year:1597, cover:"https://www.gutenberg.org/cache/epub/1513/pg1513.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1513", desc:"Екі жастардың қасіретті махаббаты. Отбасылар арасындағы қанды дау екі ғашықтың өліміне әкеледі. Махаббат пен трагедияның мәңгілік хикаясы." },
        { id:7, kk:"Отелло", author:"Уильям Шекспир", genre:"Трагедия", year:1603, cover:"https://www.gutenberg.org/cache/epub/1531/pg1531.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1531", desc:"Венеция генералы Отеллоның іштарлық пен алдаудың құрбаны болуы. Күшті махаббат пен ащы сатқындық туралы драма." },
        { id:8, kk:"Король Лир", author:"Уильям Шекспир", genre:"Трагедия", year:1606, cover:"https://www.gutenberg.org/cache/epub/1532/pg1532.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1532", desc:"Кәрі король өз патшалығын қыздарына бөліп береді. Бірақ оның шешімі трагедияға әкеледі. Билік, ақылсыздық және кешірім туралы драма." },
        { id:9, kk:"Гордость и предубеждение", author:"Джейн Остин", genre:"Романтика", year:1813, cover:"https://www.gutenberg.org/cache/epub/1342/pg1342.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1342", desc:"Элизабет Беннет пен мистер Дарсидің махаббат хикаясы. Ұлттық мақтаныш пен теріс пікір екеуін де бөліп тұрады." },
        { id:10, kk:"Алиса в стране чудес", author:"Льюис Кэрролл", genre:"Фэнтези", year:1865, cover:"https://www.gutenberg.org/cache/epub/11/pg11.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/11", desc:"Ақ қоянның соңынан түскен Алиса ерекше әлемге түседі. Онда ол кішірейіп, үлкейіп, карта патшайымымен кездеседі." },
        { id:11, kk:"Дракула", author:"Брэм Стокер", genre:"Қорқыныш", year:1897, cover:"https://www.gutenberg.org/cache/epub/345/pg345.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/345", desc:"Трансильвания графы Дракула Лондонға келіп, тірі қан іздейді. Профессор Ван Хельсинг вампирмен күреске шығады." },
        { id:12, kk:"Франкенштейн", author:"Мэри Шелли", genre:"Ғылыми фантастика", year:1818, cover:"https://www.gutenberg.org/cache/epub/84/pg84.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/84", desc:"Жас ғалым Виктор Франкенштейн өлі материядан тірі жаратылыс жасайды. Бірақ оның жаратылысы қашып, қорқынышты істер жасай бастайды." },
        { id:13, kk:"Приключения Шерлока Холмса", author:"Артур Конан Дойл", genre:"Детектив", year:1892, cover:"https://www.gutenberg.org/cache/epub/1661/pg1661.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1661", desc:"Әйгілі детектив Шерлок Холмс пен доктор Ватсонның хикаялары. Қылмысты шешудегі Холмстың теңдесі жоқ ақыл-ойы." },
        { id:14, kk:"Одиссея", author:"Гомер", genre:"Эпос", year:-800, cover:"https://www.gutenberg.org/cache/epub/1727/pg1727.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1727", desc:"Гомердің ұлы эпосы. Одиссейдің Троя соғысынан кейінгі саяхаты. Батырлық, адалдық және ақыл-ой туралы мәңгілік хикая." },
        { id:15, kk:"Дон Кихот", author:"Мигель де Сервантес", genre:"Сатира", year:1605, cover:"https://www.gutenberg.org/cache/epub/996/pg996.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/996", desc:"Ламанчелық Дон Кихоттың жел диірмендерімен шайқасы. Рыцарьлық романдарға деген махаббаты оны ессіздікке жетелейді." },
        { id:16, kk:"Робинзон Крузо", author:"Даниэль Дефо", genre:"Приключение", year:1719, cover:"https://www.gutenberg.org/cache/epub/521/pg521.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/521", desc:"Кеме апатынан кейін Робинзон аралда жалғыз қалады. Ол табиғатпен күреседі, өз өмірін құрады." },
        { id:17, kk:"Джейн Эйр", author:"Шарлотта Бронте", genre:"Романтика", year:1847, cover:"https://www.gutenberg.org/cache/epub/1260/pg1260.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/1260", desc:"Джейн Эйрдің ауыр балалық шағы мен күрделі махаббаты. Әйел теңдігі мен өзін-өзі құрметтеу туралы күшті роман." },
        { id:18, kk:"Моби Дик", author:"Герман Мелвилл", genre:"Приключение", year:1851, cover:"https://www.gutenberg.org/cache/epub/2701/pg2701.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/2701", desc:"Капитан Ахаб ақ кит Моби Дикті іздеп, теңізге шығады. Кек пен одержимость туралы эпикалық хикая." },
        { id:19, kk:"Маленький принц", author:"Антуан де Сент-Экзюпери", genre:"Философия", year:1943, cover:"https://www.gutenberg.org/cache/epub/465/pg465.cover.medium.jpg", link:"https://www.gutenberg.org/ebooks/465", desc:"Шөл далада ұшақ апатына ұшыраған ұшқыш кішкентай ханзадамен кездеседі. Махаббат, достық және өмірдің мәні туралы терең әңгіме." }
    ];
    
    // 50 кітапқа дейін толтыру
    while (booksData.length < 50) {
        const source = booksData[booksData.length % 19];
        booksData.push({
            id: booksData.length + 1,
            kk: source.kk,
            author: source.author,
            genre: source.genre,
            year: source.year,
            cover: source.cover,
            link: source.link,
            desc: source.desc
        });
    }
    
    const genreList = ["Барлығы", ...new Set(booksData.map(b => b.genre))];
    let currentGenre = "Барлығы";
    let currentSearch = "";
    let selectedChatGenre = null;
    let currentChatBooks = [];
    
    function animateStats(finalCount, totalBooks) {
        const statsEl = document.getElementById('stats');
        let current = 0;
        const duration = 800;
        const steps = 40;
        const increment = finalCount / steps;
        let step = 0;
        const timer = setInterval(() => {
            step++;
            current += increment;
            if (step >= steps) {
                current = finalCount;
                clearInterval(timer);
            }
            statsEl.innerHTML = `📊 Көрсетілген: ${Math.floor(current)} / ${totalBooks} кітап`;
        }, duration / steps);
    }
    
    function filterAndRender() {
        let filtered = booksData.filter(b => {
            if (currentGenre !== "Барлығы" && b.genre !== currentGenre) return false;
            if (currentSearch.trim()) {
                let title = b.kk.toLowerCase();
                let author = b.author.toLowerCase();
                let search = currentSearch.toLowerCase();
                if (!title.includes(search) && !author.includes(search)) return false;
            }
            return true;
        });
        renderBooks(filtered);
        animateStats(filtered.length, booksData.length);
    }
    
    function renderBooks(booksArray) {
        const container = document.getElementById('booksContainer');
        if (!container) return;
        if (booksArray.length === 0) {
            container.innerHTML = `<div class="no-books">📭 Кітап табылмады</div>`;
            return;
        }
        container.innerHTML = booksArray.map(book => {
            const shortDesc = book.desc.length > 80 ? book.desc.substring(0, 80) + '...' : book.desc;
            return `
                <div class="book-card" onclick="openModal(${book.id})">
                    <div class="book-cover" style="background-image: url('${book.cover}'); background-size: cover; background-position: center;"></div>
                    <div class="book-info">
                        <div class="book-title">${book.kk.length > 30 ? book.kk.substring(0, 27) + '...' : book.kk}</div>
                        <div class="book-author">✍️ ${book.author}</div>
                        <div class="book-desc">${shortDesc}</div>
                        <div class="book-genre">${book.genre} • ${book.year}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function openModal(bookId) {
        const book = booksData.find(b => b.id === bookId);
        if (!book) return;
        const modal = document.getElementById('bookModal');
        document.getElementById('modalTitle').innerText = book.kk;
        document.getElementById('modalAuthor').innerHTML = `✍️ Авторы: ${book.author}`;
        document.getElementById('modalGenre').innerHTML = `📚 Жанры: ${book.genre} | ${book.year}`;
        document.getElementById('modalDesc').innerText = book.desc;
        document.getElementById('modalLink').href = book.link;
        document.getElementById('modalCover').src = book.cover;
        modal.style.display = 'flex';
    }
    
    function renderGenreFilters() {
        const container = document.getElementById('genreFilter');
        container.innerHTML = genreList.map(g => `<button class="genre-btn ${currentGenre === g ? 'active' : ''}" data-g="${g}">${g}</button>`).join('');
        document.querySelectorAll('.genre-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentGenre = btn.getAttribute('data-g');
                filterAndRender();
            });
        });
    }
    
    // Чат-бот
    const chatToggle = document.getElementById('chatToggle');
    const chatWindow = document.getElementById('chatWindow');
    const closeChat = document.getElementById('closeChat');
    
    chatToggle.addEventListener('click', () => {
        chatWindow.classList.toggle('active');
        if (chatWindow.classList.contains('active')) {
            const uniqueGenres = [...new Set(booksData.map(b => b.genre))];
            const container = document.getElementById('genreButtonsContainer');
            container.innerHTML = uniqueGenres.map(g => `<button class="genre-select-btn" data-chat-genre="${g}">📚 ${g}</button>`).join('');
            document.querySelectorAll('[data-chat-genre]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const genre = e.target.getAttribute('data-chat-genre');
                    selectedChatGenre = genre;
                    currentChatBooks = booksData.filter(b => b.genre === genre).slice(0, 15);
                    const booksContainer = document.getElementById('booksListContainer');
                    booksContainer.innerHTML = currentChatBooks.map(book => `
                        <button class="book-select-btn" data-book-id="${book.id}">
                            📖 ${book.kk.length > 30 ? book.kk.substring(0, 27) + '...' : book.kk}
                            <span style="font-size:0.6rem; opacity:0.6; display:block;">${book.author}</span>
                        </button>
                    `).join('');
                    document.querySelectorAll('[data-book-id]').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const bookId = parseInt(e.target.closest('[data-book-id]').getAttribute('data-book-id'));
                            const book = booksData.find(b => b.id === bookId);
                            if (book) {
                                document.getElementById('bookInfoPanel').style.display = 'block';
                                document.getElementById('infoTitle').innerHTML = `📖 ${book.kk}`;
                                document.getElementById('infoAuthor').innerHTML = `✍️ Авторы: ${book.author}`;
                                document.getElementById('infoGenre').innerHTML = `📚 Жанры: ${book.genre}`;
                                document.getElementById('infoYear').innerHTML = `📅 Жылы: ${book.year}`;
                                document.getElementById('infoLink').href = book.link;
                            }
                        });
                    });
                });
            });
        }
    });
    closeChat.addEventListener('click', () => chatWindow.classList.remove('active'));
    
    // Іздеу
    document.getElementById('searchBtn').addEventListener('click', () => {
        currentSearch = document.getElementById('searchInput').value;
        filterAndRender();
    });
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') { currentSearch = e.target.value; filterAndRender(); }
    });
    
    // Модалды жабу
    document.querySelector('.close-modal')?.addEventListener('click', () => document.getElementById('bookModal').style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('bookModal')) document.getElementById('bookModal').style.display = 'none'; });
    
    renderGenreFilters();
    filterAndRender();
    window.openModal = openModal;
</script>
</body>
</html>
